<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Loading Sequence</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: white; font-family: sans-serif; }
        
        /* Original Loading Screen Style */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        /* The Spinning White Sphere */
        #sphere {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            /* Shadow makes the white sphere visible on white background */
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.1), 2px 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        #bar-container {
            width: 200px;
            height: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            overflow: hidden;
            background: #eee;
        }

        #bar {
            width: 0%;
            height: 100%;
            background: #4CAF50;
        }

        #status-text {
            margin-top: 20px;
            font-weight: bold;
            color: #555;
            height: 20px;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div id="sphere"></div>
        <div id="bar-container">
            <div id="bar"></div>
        </div>
        <div id="status-text">Loading...</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const bar = document.getElementById('bar');
        const status = document.getElementById('status-text');
        const screen = document.getElementById('loading-screen');

        const duration = 8000; // 8 Seconds
        let start = Date.now();

        // 1. Progress Bar Logic
        const progressInterval = setInterval(() => {
            let timePassed = Date.now() - start;
            let percent = (timePassed / duration) * 100;
            
            bar.style.width = Math.min(percent, 100) + "%";

            if (timePassed >= duration) {
                clearInterval(progressInterval);
                
                // 2. "Sphere Loaded" Text change
                status.innerText = "Sphere Loaded";
                
                // Wait a moment so user can read the text, then load the cube
                setTimeout(() => {
                    screen.style.display = 'none';
                    initCubeWorld();
                }, 1200);
            }
        }, 50);

        // 3. 3D Cube World Logic
        function initCubeWorld() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const size = 64;
            const offset = size / 2;

            // Individual Block Parts
            const cubeGeo = new THREE.BoxGeometry(1, 1, 1);
            const cubeMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            const edgeGeo = new THREE.EdgesGeometry(cubeGeo);
            const edgeMat = new THREE.LineBasicMaterial({ color: 0x000000 });

            // Calculate shell count for Instancing (much faster for iPad)
            const count = Math.pow(size, 3) - Math.pow(size - 2, 3);
            const meshInst = new THREE.InstancedMesh(cubeGeo, cubeMat, count);
            const edgeInst = new THREE.InstancedLineSegments(edgeGeo, edgeMat, count);

            let i = 0;
            const dummy = new THREE.Object3D();

            // Build the hollow shell
            for (let x = 0; x < size; x++) {
                for (let y = 0; y < size; y++) {
                    for (let z = 0; z < size; z++) {
                        // If on any outer face
                        if (x === 0 || x === size - 1 || y === 0 || y === size - 1 || z === 0 || z === size - 1) {
                            dummy.position.set(x - offset, y - offset, z - offset);
                            dummy.updateMatrix();
                            meshInst.setMatrixAt(i, dummy.matrix);
                            edgeInst.setMatrixAt(i, dummy.matrix);
                            i++;
                        }
                    }
                }
            }

            scene.add(meshInst);
            scene.add(edgeInst);

            // Place camera inside
            camera.position.set(0, 0, 0.1);

            function animate() {
                requestAnimationFrame(animate);
                // Rotate the cube around the player
                scene.rotation.y += 0.005;
                scene.rotation.x += 0.002;
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
    </script>
</body>
</html>
