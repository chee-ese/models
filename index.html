<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinning Sphere</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a;
            font-family: sans-serif;
            color: white;
        }

        #sphere {
            width: 200px;
            height: 200px;
            /* Radial gradient makes the sphere look 3D and highlights the rotation */
            background: radial-gradient(circle at 30% 30%, #ffffff, #cccccc, #555555);
            border-radius: 50%;
            animation: spin 8s linear forwards;
        }

        #message {
            display: none;
            font-size: 2rem;
            font-weight: bold;
            opacity: 0;
            transition: opacity 1s ease-in;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(720deg); } /* Rotates twice over 8 seconds */
        }
    </style>
</head>
<body>

    <div id="sphere"></div>
    <div id="message">sphere loaded</div>

    <script>
        // Set the timer to match the 8s animation
        setTimeout(() => {
            const sphere = document.getElementById('sphere');
            const message = document.getElementById('message');
            
            // Hide the sphere and show the text
            sphere.style.display = 'none';
            message.style.display = 'block';
            
            // Fade in the text
            setTimeout(() => {
                message.style.opacity = '1';
            }, 50);
        }, 8000);
    </script>
</body>
</html>
