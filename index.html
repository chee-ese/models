<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Sequential Loader</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: white; font-family: sans-serif; }
        
        #ui-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* Spinning Sphere */
        #sphere {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            box-shadow: inset -8px -8px 15px rgba(0,0,0,0.1), 1px 1px 5px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        /* Progress Bar */
        #bar-box {
            width: 240px;
            height: 12px;
            border: 2px solid #333;
            padding: 2px;
            border-radius: 4px;
        }

        #bar-fill {
            width: 0%;
            height: 100%;
            background: #00ff00;
        }

        #status {
            margin-top: 15px;
            font-weight: bold;
            color: #333;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="sphere"></div>
        <div id="bar-box"><div id="bar-fill"></div></div>
        <div id="status">INITIALIZING...</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const fill = document.getElementById('bar-fill');
        const status = document.getElementById('status');
        const ui = document.getElementById('ui-layer');

        // 1. Loading Logic (8 Seconds)
        let startTime = Date.now();
        const duration = 8000;

        function updateLoading() {
            let elapsed = Date.now() - startTime;
            let progress = Math.min((elapsed / duration) * 100, 100);
            fill.style.width = progress + '%';

            if (progress < 100) {
                requestAnimationFrame(updateLoading);
            } else {
                // Transition Step
                status.innerText = "SPHERE LOADED";
                status.style.color = "#00aa00";
                
                setTimeout(() => {
                    ui.style.display = 'none';
                    initWorld();
                }, 1500); // Show "Sphere Loaded" for 1.5s
            }
        }
        updateLoading();

        // 2. 3D World Logic
        function initWorld() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const size = 64;
            const offset = size / 2;

            // Geometry for the individual small cubes
            const cubeGeo = new THREE.BoxGeometry(1, 1, 1);
            const cubeMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });

            // Geometry for the black outlines
            const edgeGeo = new THREE.EdgesGeometry(cubeGeo);
            const edgeMat = new THREE.LineBasicMaterial({ color: 0x000000 });

            // We use InstancedMesh for the green cubes and the black outlines 
            // so the iPad can handle 24,000+ objects easily.
            const totalBlocks = Math.pow(size, 3) - Math.pow(size - 2, 3);
            const meshInstances = new THREE.InstancedMesh(cubeGeo, cubeMat, totalBlocks);
            const edgeInstances = new THREE.InstancedLineSegments(edgeGeo, edgeMat, totalBlocks);

            let i = 0;
            const dummy = new THREE.Object3D();

            for (let x = 0; x < size; x++) {
                for (let y = 0; y < size; y++) {
                    for (let z = 0; z < size; z++) {
                        // Only build the shell (hollow inside)
                        if (x === 0 || x === size - 1 || y === 0 || y === size - 1 || z === 0 || z === size - 1) {
                            dummy.position.set(x - offset, y - offset, z - offset);
                            dummy.updateMatrix();
                            meshInstances.setMatrixAt(i, dummy.matrix);
                            edgeInstances.setMatrixAt(i, dummy.matrix);
                            i++;
                        }
                    }
                }
            }

            scene.add(meshInstances);
            scene.add(edgeInstances);

            // Player position: Center of the hollow "air"
            camera.position.set(0, 0, 0.1);

            function animate() {
                requestAnimationFrame(animate);
                // Slow rotation so you can see the cube walls move around you
                scene.rotation.y += 0.003;
                scene.rotation.x += 0.002;
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
    </script>
</body>
</html>
