<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Sphere Loader</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --primary-sphere: #ffffff;
            --orbit-sphere: #444444; /* Dark grey/black with shading */
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            color: white;
        }

        #scene {
            position: relative;
            width: 300px;
            height: 300px;
            perspective: 800px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Main White Sphere */
        .central-sphere {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #888);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            animation: spin 4s linear infinite;
            z-index: 2;
        }

        /* Orbit Container */
        .orbit-system {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: rotateScene 10s linear infinite;
        }

        /* Individual Orbiting Spheres */
        .orbiter {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 18px;
            height: 18px;
            margin-top: -9px;
            margin-left: -9px;
            background: radial-gradient(circle at 30% 30%, #555, #000);
            border-radius: 50%;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        /* Finished Text */
        #status-text {
            position: absolute;
            bottom: -60px;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        @keyframes spin {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        @keyframes rotateScene {
            from { transform: rotateX(60deg) rotateZ(0deg); }
            to { transform: rotateX(60deg) rotateZ(360deg); }
        }
    </style>
</head>
<body>

    <div id="scene">
        <div class="central-sphere"></div>
        <div class="orbit-system" id="orbit-system">
            </div>
        <div id="status-text">Loading...</div>
    </div>

    <script>
        const orbitSystem = document.getElementById('orbit-system');
        const statusText = document.getElementById('status-text');
        const totalTime = 8; // seconds
        const radius = 100; // orbit distance

        // Create 8 spheres
        const spheres = [];
        for (let i = 0; i < totalTime; i++) {
            const orbiter = document.createElement('div');
            orbiter.className = 'orbiter';
            
            // Calculate position in circle
            const angle = (i / totalTime) * (Math.PI * 2);
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;
            
            orbiter.style.transform = `translate3d(${x}px, ${y}px, 0px)`;
            orbitSystem.appendChild(orbiter);
            spheres.push(orbiter);
        }

        let secondsLeft = totalTime;

        const countdown = setInterval(() => {
            secondsLeft--;

            // Remove one sphere each second
            if (spheres.length > 0) {
                const removed = spheres.pop();
                removed.style.opacity = '0';
                removed.style.transform += ' scale(0)';
            }

            if (secondsLeft <= 0) {
                clearInterval(countdown);
                statusText.innerText = "Sphere Loaded";
                statusText.style.color = "#4bb543"; // Success green
                statusText.style.fontWeight = "bold";
            }
        }, 1000);
    </script>
</body>
</html>
