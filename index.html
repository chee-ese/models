<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>20s Loading Sphere</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #ffffff; position: fixed; 
            touch-action: none; font-family: -apple-system, system-ui, sans-serif;
        }

        /* The Loading Container */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s ease-in-out;
        }

        #bar-container {
            width: 70%; max-width: 300px; height: 4px;
            background: #eeeeee; margin-top: 20px; border-radius: 10px;
            overflow: hidden;
        }

        #bar-fill {
            width: 0%; height: 100%;
            background: #333333;
        }

        #timer-text {
            margin-top: 15px; color: #888; font-size: 12px;
            font-weight: 500; letter-spacing: 1px;
        }

        /* The "Sphere Loaded" message */
        #final-message {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #333;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0; /* Hidden by default */
            transition: opacity 1s ease-in-out;
            pointer-events: none;
            z-index: 10;
        }

        .hidden { opacity: 0 !important; pointer-events: none; }
        .visible { opacity: 1 !important; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div id="canvas-container"></div>
        <div id="bar-container"><div id="bar-fill"></div></div>
        <div id="timer-text">Initializing: 0s</div>
    </div>

    <div id="final-message">Sphere Loaded</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // --- SPINNING WHITE SPHERE ---
        const geometry = new THREE.SphereGeometry(1.5, 64, 64);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0xfafafa, 
            roughness: 0.2, 
            metalness: 0.1 
        });
        const sphere = new THREE.Mesh(geometry, material);
        scene.add(sphere);

        // --- LIGHTS ---
        const mainLight = new THREE.DirectionalLight(0xffffff, 2.5);
        mainLight.position.set(5, 10, 7);
        scene.add(mainLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        camera.position.z = 5;

        // --- 20 SECOND LOGIC ---
        const duration = 20000; 
        const startTime = Date.now();
        const barFill = document.getElementById('bar-fill');
        const timerText = document.getElementById('timer-text');
        const loadingScreen = document.getElementById('loading-screen');
        const finalMessage = document.getElementById('final-message');
        
        function updateLoading() {
            const now = Date.now();
            const elapsed = now - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const secondsLeft = Math.floor(elapsed / 1000);

            barFill.style.width = (progress * 100) + "%";
            
            if (secondsLeft <= 20) {
                timerText.innerText = `Loading: ${secondsLeft}s / 20s`;
            }

            if (progress < 1) {
                requestAnimationFrame(updateLoading);
            } else {
                // ACTIONS WHEN LOADED:
                timerText.innerText = "Complete";
                loadingScreen.classList.add('hidden'); // Fade out bar/timer
                finalMessage.classList.add('visible'); // Fade in "Sphere Loaded"
            }
        }

        // --- ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);
            sphere.rotation.y += 0.025; // Constant spin
            sphere.rotation.x += 0.01;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        updateLoading();
        animate();
    </script>
</body>
</html>
