<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sequential Loading</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        #sphere {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.1), 2px 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        #bar-container {
            width: 200px;
            height: 8px;
            border: 1px solid #eee;
            border-radius: 10px;
            background: #fafafa;
            overflow: hidden;
        }

        #bar {
            width: 0%;
            height: 100%;
            background: #4CAF50;
        }

        #status-text {
            margin-top: 15px;
            color: #888;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div id="sphere"></div>
        <div id="bar-container">
            <div id="bar"></div>
        </div>
        <div id="status-text">Loading Assets...</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const bar = document.getElementById('bar');
        const statusText = document.getElementById('status-text');
        const loader = document.getElementById('loading-screen');
        
        let progress = 0;
        const duration = 8000; 
        const intervalTime = 50; 
        const increment = (intervalTime / duration) * 100;

        const loadingTimer = setInterval(() => {
            progress += increment;
            bar.style.width = Math.min(progress, 100) + '%';

            if (progress >= 100) {
                clearInterval(loadingTimer);
                
                // Update text after 8 seconds
                statusText.innerText = "Sphere Loaded";
                statusText.style.color = "#4CAF50";

                // Short delay to show the message before showing the cube
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                        initGame();
                    }, 500);
                }, 1500);
            }
        }, intervalTime);

        function initGame() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.AmbientLight(0xffffff, 1.5);
            scene.add(light);

            const size = 64;
            const cubeGeo = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });

            // Calculate total blocks for the hollow shell
            // Formula: Outer Volume - Inner Volume
            const totalBlocks = Math.pow(size, 3) - Math.pow(size - 2, 3);
            
            // Using InstancedMesh for performance
            const instancedMesh = new THREE.InstancedMesh(cubeGeo, material, totalBlocks);
            const dummy = new THREE.Object3D();
            let count = 0;

            const offset = size / 2;

            for (let x = 0; x < size; x++) {
                for (let y = 0; y < size; y++) {
                    for (let z = 0; z < size; z++) {
                        // Check if block is on the outer shell
                        if (x === 0 || x === size - 1 || 
                            y === 0 || y === size - 1 || 
                            z === 0 || z === size - 1) {
                            
                            dummy.position.set(x - offset, y - offset, z - offset);
                            dummy.updateMatrix();
                            instancedMesh.setMatrixAt(count++, dummy.matrix);
                        }
                    }
                }
            }
            scene.add(instancedMesh);

            // Create outlines (Wireframe for the whole instanced group is tricky, 
            // so we'll use one large wireframe cube for the effect)
            const outlineGeo = new THREE.BoxGeometry(size, size, size);
            const edges = new THREE.EdgesGeometry(outlineGeo);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 }));
            scene.add(line);

            // Position Camera inside the center "air"
            camera.position.set(0, 0, 5); 

            function animate() {
                requestAnimationFrame(animate);
                // Gentle rotation to see the hollow walls
                scene.rotation.y += 0.002;
                scene.rotation.x += 0.001;
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
    </script>
</body>
</html>
